# Project Information
site_name: smcx
site_description: Sequential Monte Carlo for Apple silicon, built on MLX
site_author: Michael Ellis
site_url: https://michaelellis003.github.io/smcx/
repo_url: https://github.com/michaelellis003/smcx
repo_name: michaelellis003/smcx

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Plugins
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md

# Markdown Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

# Page Navigation Hierarchy
nav:
  - Home: index.md
  - API Reference: api/
  - Design:
      - v0 Design: design/v0-design.md
      - Decisions (ADRs): adr/index.md
  - Research:
      - Literature Review: research/literature-review.md
      - Library Survey: research/library-survey.md
      - MLX Audit: research/mlx-audit.md
