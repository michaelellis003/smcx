name: Bug report
description: Report incorrect or unexpected behavior.
labels: ['bug']
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the smallest runnable example and observed output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: >-
        Include exact smcx, Python, JAX, jax-mps, and MLX versions where
        applicable, plus the operating system and device.
      placeholder: >-
        smcx 1.6.0; Python 3.13.9; JAX ...; jax-mps ...; MLX ...; macOS ...;
        M3 Pro
    validations:
      required: true
