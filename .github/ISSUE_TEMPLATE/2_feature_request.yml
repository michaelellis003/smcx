name: Feature or design proposal
description: Propose a user-facing capability or numerical design change.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete user or numerical problem should this solve?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: >-
        Add relevant evidence, prior art, constraints, or a narrow proposed
        outcome when useful.
