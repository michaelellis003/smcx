name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check that the title follows Conventional Commits
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if printf '%s' "$TITLE" | grep -qE '^(feat|fix|perf|docs|test|refactor|build|ci|chore|revert)(\([a-z0-9_.-]+\))?!?: .+'; then
            echo "PR title OK: $TITLE"
          else
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat(scope): summary'. PRs are squash-merged with the title as the commit message, which drives automated versioning."
            exit 1
          fi
