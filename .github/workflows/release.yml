name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Manual-approval gate (SPEC 8 + the GPU release gate): approving
    # a deployment to this environment attests that the GPU paths are
    # verified — either the gpu-smoke CI job ran on a Metal-enabled
    # runner, or the full suite passed on a local M-series GPU
    # (AGENTS.md step 9). Configure required reviewers on the
    # 'release' environment in repo settings.
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Python Semantic Release
        id: semver
        uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e  # v10.6.1
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          push: "false"
          vcs_release: "false"

      - name: Update lockfile and push release
        if: steps.semver.outputs.released == 'true'
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          PACKAGE_NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          uv lock --upgrade-package "$PACKAGE_NAME"
          git add uv.lock
          git tag -d "v${VERSION}"
          git commit --amend --no-edit
          git tag "v${VERSION}"
          git push origin main "v${VERSION}"

      - name: Build package
        if: steps.semver.outputs.released == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.semver.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true

      - name: Create GitHub Release
        if: steps.semver.outputs.released == 'true'
        run: gh release create "v${{ steps.semver.outputs.version }}" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
