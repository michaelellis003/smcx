name: 'Setup uv'
description: 'Install uv and sync project dependencies'

inputs:
  python-version:
    description: 'Python version to install. If omitted, uv reads pyproject.toml or .python-version'
    required: false
  locked:
    description: 'Use --locked flag for uv sync. Set to false after version bumps that invalidate the lockfile.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: 'Install uv'
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync ${{ inputs.locked == 'true' && '--locked' || '' }} --all-extras
