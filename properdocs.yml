# Project Information
site_name: smcx
site_description: Sequential Monte Carlo in JAX — particle filters, tempered SMC, and SMC²
site_author: Michael Ellis
site_url: https://michaelellis003.github.io/smcx/
repo_url: https://github.com/michaelellis003/smcx
repo_name: michaelellis003/smcx

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Plugins
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
      implicit_index: true
  - mkdocs-jupyter:
      execute: false
      include_source: true

# Markdown Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

exclude_docs: |
  gen_ref_pages.py
  adr/
  design/
  research/
  conversation.md
  ecosystem-conversation.md

# Page Navigation Hierarchy
nav:
  - Home: index.md
  - Getting started: guides/quickstart.md
  - Guides:
      - ArviZ reporting: guides/arviz.md
      - Custom models: guides/custom-models.md
      - Stochastic volatility: guides/stochastic-volatility.md
      - Regime-switching HMM: examples/thesis_hmm_bayesian_workflow.ipynb
  - API reference: api/
